name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force release even if tag exists'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  check:
    name: Check & tag
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
      tag: ${{ steps.decide.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide whether to build
        id: decide
        run: |
          if [ "${{ github.ref_type }}" == "tag" ]; then
            # Direct tag push — always build
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "Triggered by tag push: ${{ github.ref_name }}"

          else
            # Branch push or workflow_dispatch — auto-tag if version is new
            VERSION=$(node -p "require('./package.json').version")
            TAG="v${VERSION}"
            echo "tag=${TAG}" >> $GITHUB_OUTPUT

            if git rev-parse "$TAG" >/dev/null 2>&1 && [ "${{ inputs.force }}" != "true" ]; then
              echo "should_build=false" >> $GITHUB_OUTPUT
              echo "Tag $TAG already exists and force=false — skipping."
            else
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              # Delete existing tag if force
              if git rev-parse "$TAG" >/dev/null 2>&1; then
                git tag -d "$TAG"
                git push origin ":refs/tags/$TAG" || true
              fi
              git tag "$TAG"
              git push origin "$TAG"
              echo "should_build=true" >> $GITHUB_OUTPUT
              echo "Created and pushed tag $TAG"
            fi
          fi

  build-mac:
    name: Build macOS
    runs-on: macos-latest
    needs: [check]
    if: needs.check.outputs.should_build == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build and package
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-artifacts
          path: release/**/*.dmg
          retention-days: 1

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [check]
    if: needs.check.outputs.should_build == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build and package
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: release/**/*.exe
          retention-days: 1

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: [check]
    if: needs.check.outputs.should_build == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg

      - name: Build and package
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            release/**/*.AppImage
            release/**/*.deb
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [check, build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: needs.build-mac.result == 'success' && needs.build-windows.result == 'success' && needs.build-linux.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ needs.check.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.tag }}
          name: SessionLens ${{ needs.check.outputs.tag }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.CHANGELOG }}

            ---
            **Downloads**
            | Platform | File |
            |----------|------|
            | macOS (Intel + Apple Silicon) | `.dmg` |
            | Windows | `.exe` (NSIS installer) |
            | Linux | `.AppImage`, `.deb` |
          files: artifacts/**/*
          draft: false
          prerelease: ${{ contains(needs.check.outputs.tag, '-beta') || contains(needs.check.outputs.tag, '-alpha') || contains(needs.check.outputs.tag, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
