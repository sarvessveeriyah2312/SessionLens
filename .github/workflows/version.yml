name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: Pre-release tag (leave empty for stable)
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  bump:
    name: Bump version and tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          BUMP="${{ inputs.bump }}"
          PRE="${{ inputs.prerelease }}"

          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT%%-*}"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          if [ -n "$PRE" ]; then
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}-${PRE}.1"
          else
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Update package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Commit and tag
        run: |
          git add package.json
          git commit -m "chore: bump version to v${{ steps.version.outputs.new_version }}"
          git tag "v${{ steps.version.outputs.new_version }}"
          git push origin HEAD
          git push origin "v${{ steps.version.outputs.new_version }}"

      - name: Summary
        run: |
          echo "### Version bumped to v${{ steps.version.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "The release workflow will now build and publish the release automatically." >> $GITHUB_STEP_SUMMARY
